<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntero Mágico QR</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #desktop-view { text-align: center; }
        #qrcode {
            border: 15px solid white;
            border-radius: 10px;
            background: white;
            margin-bottom: 20px;
        }
        #pointer {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff2a2a;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff2a2a;
            display: none; /* Oculto hasta que el móvil se conecte */
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        #mobile-view { text-align: center; display: none; }
        button {
            padding: 20px 30px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { background-color: #0056b3; }
        #recal-btn { background-color: #ff9800; display: none; }
    </style>
</head>
<body>

    <div id="desktop-view" style="display:none;">
        <h2 id="desktop-status">Escanea este código con tu móvil</h2>
        <canvas id="qrcode"></canvas>
        <div id="pointer"></div>
    </div>

    <div id="mobile-view">
        <h2 id="mobile-status">Conectando a la pizarra...</h2>
        <button id="start-btn" style="display:none;">Activar Puntero</button>
        <button id="recal-btn">Recalibrar Centro</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('host');

        if (hostId) {
            // ==========================================
            // MÓVIL (Lo que pasa cuando escaneas el QR)
            // ==========================================
            document.getElementById('mobile-view').style.display = 'block';
            const peer = new Peer();
            const startBtn = document.getElementById('start-btn');
            const recalBtn = document.getElementById('recal-btn');
            const statusText = document.getElementById('mobile-status');
            let conn;

            peer.on('open', () => {
                conn = peer.connect(hostId);
                conn.on('open', () => {
                    statusText.innerText = "¡Conectado!";
                    startBtn.style.display = 'inline-block';
                });
            });

            startBtn.addEventListener('click', () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') activarSensores();
                            else alert("Se necesitan permisos del giroscopio.");
                        })
                        .catch(console.error);
                } else {
                    activarSensores();
                }
            });

            recalBtn.addEventListener('click', () => {
                if (conn && conn.open) conn.send({ action: 'recalibrate' });
            });

            function activarSensores() {
                startBtn.style.display = 'none';
                recalBtn.style.display = 'inline-block';
                statusText.innerText = "Mueve el móvil como un puntero";
                
                window.addEventListener('deviceorientation', (event) => {
                    if (conn && conn.open) {
                        conn.send({ beta: event.beta, gamma: event.gamma });
                    }
                });
            }

        } else {
            // ==========================================
            // ORDENADOR (Lo que pasa al abrir la web normal)
            // ==========================================
            document.getElementById('desktop-view').style.display = 'block';
            
            // Inventamos un ID aleatorio al instante para que no se atasque
            const miIDAleatorio = 'puntero-' + Math.floor(Math.random() * 1000000);
            
            // Construimos la URL que tendrá el código QR
            const mobileUrl = window.location.href.split('?')[0] + '?host=' + miIDAleatorio;
            
            // Dibujamos el QR en la pantalla de forma instantánea
            const qrCanvas = document.getElementById('qrcode');
            QRCode.toCanvas(qrCanvas, mobileUrl, function (error) {
                if (error) console.error(error);
            });

            // Arrancamos la conexión escuchando ese ID
            const peer = new Peer(miIDAleatorio); 
            const pointer = document.getElementById('pointer');
            const statusText = document.getElementById('desktop-status');

            peer.on('connection', (conn) => {
                // ¡MAGIA! Cuando el móvil se conecta, ocultamos el QR y sacamos el ratón rojo
                qrCanvas.style.display = 'none';
                statusText.style.display = 'none';
                pointer.style.display = 'block';

                let initialBeta = null;
                let initialGamma = null;
                const sensitivity = 20; 

                conn.on('data', (data) => {
                    if (data.action === 'recalibrate') {
                        initialBeta = null;
                        initialGamma = null;
                        return;
                    }

                    if (initialBeta === null) initialBeta = data.beta;
                    if (initialGamma === null) initialGamma = data.gamma;

                    let diffGamma = data.gamma - initialGamma; 
                    let diffBeta = data.beta - initialBeta;    

                    let x = (window.innerWidth / 2) + (diffGamma * sensitivity);
                    let y = (window.innerHeight / 2) + (diffBeta * sensitivity);

                    x = Math.max(0, Math.min(window.innerWidth, x));
                    y = Math.max(0, Math.min(window.innerHeight, y));

                    pointer.style.left = x + 'px';
                    pointer.style.top = y + 'px';
                });
            });
        }
    </script>
</body>
</html>
