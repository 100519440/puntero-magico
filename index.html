<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntero Mágico QR</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #desktop-view { text-align: center; }
        #pointer {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff2a2a;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff2a2a;
            display: none;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        #mobile-view { text-align: center; display: none; }
        button {
            padding: 20px 30px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { background-color: #0056b3; }
        #recal-btn { background-color: #ff9800; display: none; }
    </style>
</head>
<body>

    <div id="desktop-view" style="display:none;">
        <h2 id="desktop-status">Esperando a que escanees tu QR...</h2>
        <div id="pointer"></div>
    </div>

    <div id="mobile-view">
        <h2 id="mobile-status">Conectando...</h2>
        <button id="start-btn" style="display:none;">Activar Puntero</button>
        <button id="recal-btn">Recalibrar Centro</button>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN IMPORTANTE
        // ==========================================
        // Pon aquí una contraseña o nombre único. Si alguien usa el mismo, fallará.
        // Escribe algo largo y sin espacios (ej: mi-puntero-clase-juan-12345)
        const ID_FIJO = "mi-puntero-secreto-definitivo-999"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('host');

        if (hostId) {
            // ==========================================
            // MÓVIL
            // ==========================================
            document.getElementById('mobile-view').style.display = 'block';
            const peer = new Peer();
            const startBtn = document.getElementById('start-btn');
            const recalBtn = document.getElementById('recal-btn');
            const statusText = document.getElementById('mobile-status');
            let conn;

            peer.on('open', () => {
                conn = peer.connect(hostId);
                conn.on('open', () => {
                    statusText.innerText = "¡Conectado a la pizarra!";
                    startBtn.style.display = 'inline-block';
                });
            });

            startBtn.addEventListener('click', () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') activarSensores();
                            else alert("Se necesitan permisos del giroscopio.");
                        })
                        .catch(console.error);
                } else {
                    activarSensores();
                }
            });

            recalBtn.addEventListener('click', () => {
                if (conn && conn.open) conn.send({ action: 'recalibrate' });
            });

            function activarSensores() {
                startBtn.style.display = 'none';
                recalBtn.style.display = 'inline-block';
                statusText.innerText = "Apunta a la pantalla y mueve el móvil";
                
                window.addEventListener('deviceorientation', (event) => {
                    if (conn && conn.open) {
                        conn.send({ beta: event.beta, gamma: event.gamma });
                    }
                });
            }

        } else {
            // ==========================================
            // ORDENADOR (PANTALLA)
            // ==========================================
            document.getElementById('desktop-view').style.display = 'block';
            
            // Le decimos a la página que use SIEMPRE el mismo ID
            const peer = new Peer(ID_FIJO); 
            const pointer = document.getElementById('pointer');
            const statusText = document.getElementById('desktop-status');

            peer.on('open', () => {
                statusText.innerText = "Listo. Esperando a que uses el móvil...";
            });

            peer.on('connection', (conn) => {
                statusText.style.display = 'none'; // Ocultamos el texto
                pointer.style.display = 'block';   // Mostramos la bola roja

                let initialBeta = null;
                let initialGamma = null;
                const sensitivity = 20; 

                conn.on('data', (data) => {
                    if (data.action === 'recalibrate') {
                        initialBeta = null;
                        initialGamma = null;
                        return;
                    }

                    if (initialBeta === null) initialBeta = data.beta;
                    if (initialGamma === null) initialGamma = data.gamma;

                    let diffGamma = data.gamma - initialGamma; 
                    let diffBeta = data.beta - initialBeta;    

                    let x = (window.innerWidth / 2) + (diffGamma * sensitivity);
                    let y = (window.innerHeight / 2) + (diffBeta * sensitivity);

                    x = Math.max(0, Math.min(window.innerWidth, x));
                    y = Math.max(0, Math.min(window.innerHeight, y));

                    pointer.style.left = x + 'px';
                    pointer.style.top = y + 'px';
                });
            });
        }
    </script>
</body>
</html>
